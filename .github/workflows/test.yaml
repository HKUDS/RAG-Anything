name: Tests

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: ['3.10', '3.11', '3.12']

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                # Core package + light extras used by unit tests.
                # Skip heavy optional stacks (paddleocr, weasyprint) — those
                # modules are mocked or optional in the unit suite.
                pip install -e ".[image,text]"
                pip install pytest pytest-asyncio

            - name: Run tests
              run: pytest tests/ -v
