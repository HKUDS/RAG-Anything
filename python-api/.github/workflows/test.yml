name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: "3.11"
  REDIS_URL: redis://localhost:6379/15
  TESTING: 1

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        test-type: [unit, integration, security, e2e]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y 
          build-essential 
          libmagic1 
          libmagic-dev 
          poppler-utils 
          tesseract-ocr

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .[dev]

    - name: Wait for Redis
      run: |
        until redis-cli -h localhost -p 6379 ping; do
          echo "Waiting for Redis..."
          sleep 1
        done

    - name: Run ${{ matrix.test-type }} tests
      run: |
        case "${{ matrix.test-type }}" in
          unit)
            pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term-missing
            ;;
          integration)
            pytest tests/integration/ -v --cov=app --cov-append --cov-report=xml
            ;;
          security)
            pytest tests/security/ -v -m security
            ;;
          e2e)
            pytest tests/e2e/ -v -m e2e --maxfail=5
            ;;
        esac

    - name: Upload coverage to Codecov
      if: matrix.test-type == 'unit'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results-${{ matrix.test-type }}
        path: |
          htmlcov/
          test_reports/
          .coverage
        retention-days: 30

  performance:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .[dev]

    - name: Run performance tests
      run: |
        pytest tests/performance/ -v -m performance --benchmark-only --benchmark-json=benchmark.json

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: false

  load-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .[dev]

    - name: Start API server in background
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 10  # Wait for server to start

    - name: Run load tests
      run: |
        cd tests/performance
        locust -f locustfile.py --host http://localhost:8000 \
          --users 50 --spawn-rate 5 --run-time 2m --headless \
          --html load_test_report.html --csv load_test

    - name: Upload load test results
      uses: actions/upload-artifact@v3
      with:
        name: load-test-results
        path: tests/performance/load_test*

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Run Bandit security scan
      run: |
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/ -f txt

    - name: Run Safety check
      run: |
        safety check --json --output safety-report.json || true
        safety check

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff mypy

    - name: Check code formatting with Black
      run: black --check app/ tests/

    - name: Lint with Ruff
      run: ruff check app/ tests/

    - name: Type check with MyPy
      run: mypy app/

  docker:
    runs-on: ubuntu-latest
    needs: [test, security-scan, code-quality]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t raganything-api:test .
    
    - name: Test Docker image
      run: |
        # Start container
        docker run -d --name api-test -p 8000:8000 \
          -e TESTING=1 \
          -e REDIS_URL=redis://host.docker.internal:6379/15 \
          raganything-api:test
        
        # Wait for startup
        sleep 10
        
        # Test health endpoint
        curl -f http://localhost:8000/api/v1/health || exit 1
        
        # Cleanup
        docker stop api-test
        docker rm api-test

  report:
    runs-on: ubuntu-latest
    needs: [test, performance, load-test, security-scan]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Generate test report
      run: |
        python -c "
        import json
        import os
        from datetime import datetime
        
        report = {
          'timestamp': datetime.utcnow().isoformat(),
          'workflow_run': '${{ github.run_number }}',
          'commit': '${{ github.sha }}',
          'branch': '${{ github.ref_name }}',
          'test_results': {},
          'artifacts': []
        }
        
        # List all artifacts
        for root, dirs, files in os.walk('.'):
          for file in files:
            if file.endswith(('.json', '.html', '.xml')):
              report['artifacts'].append(os.path.join(root, file))
        
        with open('test_summary.json', 'w') as f:
          json.dump(report, f, indent=2)
        
        print(f'Generated test summary with {len(report[\"artifacts\"])} artifacts')
        "

    - name: Upload combined report
      uses: actions/upload-artifact@v3
      with:
        name: test-summary
        path: test_summary.json

  notify:
    runs-on: ubuntu-latest
    needs: [test, performance, load-test, security-scan, docker]
    if: always() && (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
    - name: Notify on success
      if: needs.test.result == 'success' && needs.security-scan.result == 'success'
      run: |
        echo "✅ All tests passed successfully!"
        echo "Commit: ${{ github.sha }}"
        echo "Branch: ${{ github.ref_name }}"

    - name: Notify on failure
      if: needs.test.result == 'failure' || needs.security-scan.result == 'failure'
      run: |
        echo "❌ Test failures detected!"
        echo "Test result: ${{ needs.test.result }}"
        echo "Security scan result: ${{ needs.security-scan.result }}"
        echo "Please check the logs and artifacts."
        exit 1